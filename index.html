<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理赔廉洁从业禁令考试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .content { padding: 30px; }
        
        /* 姓名输入 */
        .name-section { text-align: center; padding: 50px 20px; }
        .name-input {
            width: 100%; max-width: 400px; padding: 15px;
            font-size: 18px; border: 2px solid #ddd; border-radius: 10px;
            margin-bottom: 20px; text-align: center;
        }
        .name-input:focus { outline: none; border-color: #667eea; }
        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 15px 50px;
            font-size: 18px; border-radius: 10px; cursor: pointer;
            transition: transform 0.2s;
        }
        .start-btn:hover { transform: translateY(-2px); }
        .start-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        
        /* 考试区域 */
        .exam-section { display: none; }
        .welcome {
            background: #f0f0f0; padding: 15px; border-radius: 10px;
            margin-bottom: 20px; text-align: center;
            color: #667eea; font-weight: bold;
        }
        .progress-bar { background: #e0e0e0; height: 8px; border-radius: 4px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%; width: 0%; transition: width 0.3s;
        }
        .question {
            margin-bottom: 20px; padding: 15px; background: #f8f9fa;
            border-radius: 10px; border-left: 4px solid #667eea;
        }
        .question-num {
            background: #667eea; color: white; padding: 3px 12px;
            border-radius: 20px; font-size: 13px; font-weight: bold;
            display: inline-block; margin-bottom: 10px;
        }
        .answer-input {
            width: 100%; padding: 10px; border: 2px solid #ddd;
            border-radius: 8px; font-size: 14px; transition: all 0.3s; margin-top: 8px;
        }
        .answer-input:focus { outline: none; border-color: #667eea; }
        .answer-input.correct { border-color: #4caf50; background: #f1f8f1; }
        .answer-input.incorrect { border-color: #f44336; background: #fff5f5; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 12px 30px;
            font-size: 15px; border-radius: 10px; cursor: pointer;
            width: 100%; margin-top: 15px;
        }
        
        /* 结果页面 */
        .result { display: none; text-align: center; padding: 30px; }
        .result.show { display: block; }
        .score {
            font-size: 64px; font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }
        .wrong-list { margin-top: 30px; text-align: left; }
        .wrong-item {
            background: #fff5f5; border-left: 4px solid #f44336;
            padding: 15px; margin: 10px 0; border-radius: 8px;
        }
        .wrong-item h4 { color: #f44336; margin-bottom: 8px; }
        
        /* 管理后台 */
        .admin-section { display: none; padding: 30px; }
        .admin-header {
            background: linear-gradient(135deg, #f44336 0%, #e91e63 100%);
            color: white; padding: 20px; border-radius: 10px;
            margin-bottom: 30px; text-align: center;
        }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .admin-table th, .admin-table td {
            padding: 12px; text-align: left; border-bottom: 1px solid #ddd;
        }
        .admin-table th { background: #f8f9fa; font-weight: bold; }
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 12px; font-weight: bold;
        }
        .badge-success { background: #4caf50; color: white; }
        .badge-warning { background: #ff9800; color: white; }
        .badge-danger { background: #f44336; color: white; }
        .detail-btn {
            background: #2196f3; color: white; border: none;
            padding: 5px 15px; border-radius: 5px; cursor: pointer;
            font-size: 12px;
        }
        .back-btn {
            background: #9e9e9e; color: white; border: none;
            padding: 10px 30px; border-radius: 8px; cursor: pointer;
            margin-bottom: 20px;
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal.show { 
            display: flex; justify-content: center; align-items: center; 
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 15px;
            max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚫 理赔廉洁从业禁令考试</h1>
            <p>共20题 | 填空题 | 请补全"严禁"后面的内容</p>
        </div>
        <div class="content">
            <!-- 姓名输入页面 -->
            <div class="name-section" id="nameSection">
                <h2>📝 请输入你的姓名</h2>
                <input type="text" class="name-input" id="userName" 
                       placeholder="至少输入2个字符..." oninput="toggleStartBtn()">
                <br>
                <button class="start-btn" id="startBtn" onclick="startExam()" disabled>开始考试</button>
                <br><br>
                <button class="btn" onclick="showAdmin()" 
                        style="width: auto; padding: 10px 30px; font-size: 14px; 
                               background: linear-gradient(135deg, #f44336 0%, #e91e63 100%);">
                    🔐 管理后台
                </button>
            </div>
            
            <!-- 考试页面 -->
            <div class="exam-section" id="examSection">
                <div class="welcome" id="welcomeMsg"></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress"></div>
                </div>
                <form id="quizForm"></form>
                <button type="button" class="btn" onclick="submitQuiz()">📝 提交考试</button>
            </div>
            
            <!-- 结果页面 -->
            <div class="result" id="result">
                <h2>🎉 <span id="resultName"></span>，考试完成！</h2>
                <div class="score" id="score">0</div>
                <p id="resultText"></p>
                <div class="wrong-list" id="wrongList"></div>
                <button class="btn" onclick="location.reload()" style="margin-top:30px;">🔄 重新考试</button>
            </div>
            
            <!-- 管理后台 -->
            <div class="admin-section" id="adminSection">
                <button class="back-btn" onclick="backToHome()">← 返回首页</button>
                <div class="admin-header">
                    <h2>🔐 考试管理后台</h2>
                    <p>查看所有考生的考试记录和成绩</p>
                </div>
                <div id="adminContent"></div>
            </div>
        </div>
    </div>
    
    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <h3>📊 考试详情</h3>
            <div id="modalContent"></div>
            <button class="btn" onclick="closeModal()" style="margin-top:20px;">关闭</button>
        </div>
    </div>
    
    <script>
        // 20条禁令（全局变量）
        const articles = [
            "主动或者协助伪造、编造虚假事故、虚假理赔单证",
            "违规通融赔付或者扩大赔款金额",
            "虚增、虚列、虚报理赔费用",
            "对骗赔行为纵容、默许、提供便利",
            "擅自截留赔款或者将赔款挪作他用",
            "伪造或者使用伪造的公文、证件、印章",
            "违规外授理赔权限",
            "不同人员间工号串用",
            "违规向非公司推荐修理厂送修车辆",
            "在理赔第三方资源采购、委托、遴选中操纵、串通、泄密",
            "插手、过问、干预理赔案件事项谋取不正当利益",
            "违规收受、索取利害关系人财物",
            "利用职务之便与第三方合作机构、人员发生财物往来或者兜售物品、商品",
            "接受有碍公正理赔的宴请或者其他服务",
            "本人及近亲属从事、参与与理赔有利益关联的经营活动",
            "处理本人及近亲属的赔案",
            "未经客户本人授权对外使用或泄露客户信息",
            "吸毒、酒驾、赌博",
            "理赔服务用车公车私用",
            "工作时间饮酒"
        ];
        
        let examQuestions = [];  // 存储随机排序后的题目
        let currentUser = "";
        
        // 初始化：加载已有考试记录
        let examRecords = JSON.parse(localStorage.getItem('examRecords') || '[]');
        
        // ==================== 姓名输入相关 ====================
        function toggleStartBtn() {
            const name = document.getElementById("userName").value.trim();
            document.getElementById("startBtn").disabled = (name.length < 2);
        }
        
        function startExam() {
            currentUser = document.getElementById("userName").value.trim();
            if (currentUser.length < 2) return;
            
            document.getElementById("nameSection").style.display = "none";
            document.getElementById("examSection").style.display = "block";
            document.getElementById("welcomeMsg").innerHTML = 
                "👤 考生：" + currentUser + "　|　📅 " + new Date().toLocaleDateString("zh-CN");
            
            // 随机打乱20条禁令作为考试题目
            examQuestions = shuffleArray(articles.slice());
            generateQuestions();
        }
        
        function shuffleArray(arr) {
            const newArr = arr.slice();
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }
        
        // ==================== 生成题目 ====================
        function generateQuestions() {
            const form = document.getElementById("quizForm");
            form.innerHTML = "";
            
            examQuestions.forEach((q, index) => {
                const num = index + 1;
                const div = document.createElement("div");
                div.className = "question";
                div.id = "q" + num;
                div.innerHTML = '<span class="question-num">第 ' + num + ' 题</span>' +
                    '<div><strong>严禁</strong>' +
                    '<input type="text" class="answer-input" id="a' + num + 
                    '" placeholder="请填写..." oninput="checkAnswer(' + num + ')">' +
                    '</div>';
                form.appendChild(div);
            });
        }
        
        // ==================== 实时检查答案 ====================
        function normalize(str) {
            return str.trim().replace(/\s+/g, "").toLowerCase();
        }
        
        function checkAnswer(num) {
            const input = document.getElementById("a" + num);
            const userAnswer = input.value;
            
            if (userAnswer.trim() === "") {
                input.classList.remove("correct", "incorrect");
                updateProgress();
                return;
            }
            
            // 实时检查：只要匹配20条中任一条就显示绿色
            const normalizedUser = normalize(userAnswer);
            let matchAny = false;
            for (let article of articles) {
                if (normalize(article) === normalizedUser) {
                    matchAny = true;
                    break;
                }
            }
            
            if (matchAny) {
                input.classList.add("correct");
                input.classList.remove("incorrect");
            } else {
                input.classList.add("incorrect");
                input.classList.remove("correct");
            }
            
            updateProgress();
        }
        
        function updateProgress() {
            const inputs = document.querySelectorAll(".answer-input");
            let filled = 0;
            inputs.forEach(input => {
                if (input.value.trim() !== "") filled++;
            });
            const pct = (filled / examQuestions.length * 100).toFixed(0);
            document.getElementById("progress").style.width = pct + "%";
        }
        
        // ==================== 提交考试（核心判分逻辑）====================
        function submitQuiz() {
            let score = 0;
            const wrongItems = [];
            const usedArticles = new Set();  // 已匹配的禁令索引
            
            // 第一步：收集所有答案
            const allAnswers = [];
            examQuestions.forEach((question, index) => {
                const num = index + 1;
                const input = document.getElementById("a" + num);
                const userAnswer = input.value.trim();
                
                allAnswers.push({
                    num: num,
                    expectedAnswer: question,  // 这道随机题对应的正确答案
                    userAnswer: userAnswer,
                    normalized: normalize(userAnswer),
                    matchedIndex: -1  // 用户答案实际匹配的禁令索引
                });
            });
            
            // 第二步：智能判分
            allAnswers.forEach(item => {
                if (item.userAnswer === "") {
                    // 未作答
                    wrongItems.push({
                        num: item.num,
                        userAnswer: "(未作答)",
                        matchedText: "未作答",
                        isDuplicate: false
                    });
                    return;
                }
                
                // 查找匹配的答案（还未被使用）
                let matchedIndex = -1;
                for (let i = 0; i < articles.length; i++) {
                    if (normalize(articles[i]) === item.normalized && !usedArticles.has(i)) {
                        matchedIndex = i;
                        break;
                    }
                }
                
                if (matchedIndex !== -1) {
                    // 匹配成功，标记为已使用
                    item.matchedIndex = matchedIndex;
                    usedArticles.add(matchedIndex);
                    score++;
                } else {
                    // 检查是否是重复答案
                    let isDuplicate = false;
                    for (let i = 0; i < articles.length; i++) {
                        if (normalize(articles[i]) === item.normalized) {
                            isDuplicate = true;
                            break;
                        }
                    }
                    
                    wrongItems.push({
                        num: item.num,
                        userAnswer: item.userAnswer,
                        matchedText: isDuplicate ? 
                            ("与第" + (allAnswers.find(a => a.matchedIndex === i && i >= 0)?.num || "?") + "题重复) : 
                            "不匹配任何禁令",
                        isDuplicate: isDuplicate
                    });
                }
            });
            
            // 第三步：保存考试记录
            const record = {
                id: Date.now(),
                name: currentUser,
                date: new Date().toLocaleString("zh-CN"),
                score: score,
                total: examQuestions.length,
                percentage: Math.round(score / examQuestions.length * 100),
                wrongCount: wrongItems.length,
                answers: allAnswers,
                wrongItems: wrongItems
            };
            
            examRecords.push(record);
            localStorage.setItem('examRecords', JSON.stringify(examRecords));
            
            // 第四步：显示结果
            const pct = Math.round(score / examQuestions.length * 100);
            document.getElementById("score").textContent = pct + "分";
            document.getElementById("resultName").textContent = currentUser;
            
            let comment = "";
            if (pct >= 90) comment = "🎊 优秀！你对禁令非常熟悉！";
            else if (pct >= 60) comment = "👍 及格！还需要加强学习。";
            else comment = "💪 不及格，请认真学习禁令内容！";
            
            document.getElementById("resultText").innerHTML = 
                "答对 <strong>" + score + "</strong> 题，共 <strong>" + examQuestions.length + "</strong> 题<br>" + comment;
            
            // 显示错题详情
            const wrongDiv = document.getElementById("wrongList");
            if (wrongItems.length > 0) {
                let html = "<h3>❌ 错题详情：</h3>";
                wrongItems.forEach(item => {
                    html += '<div class="wrong-item">' +
                        "<h4>第 " + item.num + " 题</h4>" +
                        "<p><strong>你的答案：</strong>" + item.userAnswer + "</p>" +
                        "<p><strong>判分结果：</strong>" + item.matchedText + "</p>" +
                        "</div>";
                });
                wrongDiv.innerHTML = html;
            } else {
                wrongDiv.innerHTML = "<h3>🎉 太棒了！全部答对！</h3>";
            }
            
            document.getElementById("examSection").style.display = "none";
            document.getElementById("result").classList.add("show");
        }
        
        // ==================== 管理后台 ====================
        function showAdmin() {
            const password = prompt("请输入管理密码：");
            if (password !== "admin123") {
                alert("密码错误！");
                return;
            }
            
            document.getElementById("nameSection").style.display = "none";
            document.getElementById("adminSection").style.display = "block";
            
            renderAdminTable();
        }
        
        function renderAdminTable() {
            const container = document.getElementById("adminContent");
            
            if (examRecords.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#999;">暂无考试记录</p>';
                return;
            }
            
            let html = '<table class="admin-table">' +
                "<tr>" +
                "<th>序号</th>" +
                "<th>姓名</th>" +
                "<th>日期</th>" +
                "<th>成绩</th>" +
                "<th>错题数</th>" +
                "<th>操作</th>" +
                "</tr>";
            
            examRecords.forEach((record, index) => {
                let badgeClass = "badge-success";
                if (record.percentage < 60) badgeClass = "badge-danger";
                else if (record.percentage < 90) badgeClass = "badge-warning";
                
                html += "<tr>" +
                    "<td>" + (index + 1) + "</td>" +
                    "<td><strong>" + record.name + "</strong></td>" +
                    "<td>" + record.date + "</td>" +
                    "<td><span class='badge " + badgeClass + "'>" + record.score + "/" + record.total + " (" + record.percentage + "分)</span></td>" +
                    "<td>" + (record.wrongCount > 0 ? "<span style='color:#f44336;'>" + record.wrongCount + "题</span>" : "<span style='color:#4caf50;'>无</span>") + "</td>" +
                    "<td><button class='detail-btn' onclick='showDetail(" + record.id + ")'>查看详情</button></td>" +
                    "</tr>";
            });
            
            html += "</table>";
            container.innerHTML = html;
        }
        
        function showDetail(recordId) {
            const record = examRecords.find(r => r.id === recordId);
            if (!record) return;
            
            let html = "<p><strong>姓名：</strong>" + record.name + "</p>";
            html += "<p><strong>日期：</strong>" + record.date + "</p>";
            html += "<p><strong>成绩：</strong>" + record.score + "/" + record.total + " (" + record.percentage + "分)</p>";
            html += "<hr style='margin:15px 0;'>";
            html += "<h4>答题详情：</h4>";
            
            record.answers.forEach(item => {
                const isCorrect = item.matchedIndex >= 0;
                html += "<div style='margin:10px 0;padding:10px;background:" + (isCorrect ? "#f1f8f1" : "#fff5f5") + ";border-radius:5px;'>" +
                    "<strong>第" + item.num + "题：</strong><br>" +
                    "你的答案：" + (item.userAnswer || "(未作答)") + "<br>" +
                    "判分结果：" + (isCorrect ? ("✅ 正确（匹配：" + articles[item.matchedIndex] + ")") : item.matchedText) +
                    "</div>";
            });
            
            document.getElementById("modalContent").innerHTML = html;
            document.getElementById("detailModal").classList.add("show");
        }
        
        function closeModal() {
            document.getElementById("detailModal").classList.remove("show");
        }
        
        function backToHome() {
            document.getElementById("adminSection").style.display = "none";
            document.getElementById("nameSection").style.display = "block";
        }
    </script>
</body>
</html>
