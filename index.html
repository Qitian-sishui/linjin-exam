<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理赔廉洁从业禁令考试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .content { padding: 30px; }
        
        /* 姓名输入 */
        .name-section {
            text-align: center;
            padding: 50px 20px;
        }
        .name-section h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .name-input {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .name-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .start-btn:hover { transform: translateY(-2px); }
        .start-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        /* 考试区域 */
        .exam-section { display: none; }
        .welcome {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }
        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .question {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .question-num {
            background: #667eea;
            color: white;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        .answer-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .answer-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .answer-input.correct {
            border-color: #4caf50;
            background: #f1f8f1;
        }
        .answer-input.incorrect {
            border-color: #f44336;
            background: #fff5f5;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 15px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        
        /* 结果 */
        .result { display: none; text-align: center; padding: 30px; }
        .result.show { display: block; }
        .score {
            font-size: 64px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }
        .wrong-list {
            margin-top: 30px;
            text-align: left;
        }
        .wrong-item {
            background: #fff5f5;
            border-left: 4px solid #f44336;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .wrong-item h4 {
            color: #f44336;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚫 理赔廉洁从业禁令考试</h1>
            <p>共20题 | 填空题 | 请补全"严禁"后面的内容</p>
        </div>
        <div class="content">
            <!-- 姓名输入 -->
            <div class="name-section" id="nameSection">
                <h2>📝 请输入你的姓名</h2>
                <input type="text" class="name-input" id="userName" placeholder="输入姓名..." oninput="toggleStartBtn()">
                <br>
                <button class="start-btn" id="startBtn" onclick="startExam()" disabled>开始考试</button>
            </div>
            
            <!-- 考试 -->
            <div class="exam-section" id="examSection">
                <div class="welcome" id="welcomeMsg"></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress"></div>
                </div>
                <form id="quizForm"></form>
                <button type="button" class="btn" onclick="submitQuiz()">📝 提交考试</button>
            </div>
            
            <!-- 结果 -->
            <div class="result" id="result">
                <h2>🎉 <span id="resultName"></span>，考试完成！</h2>
                <div class="score" id="score">0</div>
                <p id="resultText"></p>
                <div class="wrong-list" id="wrongList"></div>
                <button class="btn" onclick="location.reload()" style="margin-top:30px;">🔄 重新考试</button>
            </div>
        </div>
    </div>
    
    <script>
        // 20条禁令
        const articles = [
            "主动或者协助伪造、编造虚假事故、虚假理赔单证",
            "违规通融赔付或者扩大赔款金额",
            "虚增、虚列、虚报理赔费用",
            "对骗赔行为纵容、默许、提供便利",
            "擅自截留赔款或者将赔款挪作他用",
            "伪造或者使用伪造的公文、证件、印章",
            "违规外授理赔权限",
            "不同人员间工号串用",
            "违规向非公司推荐修理厂送修车辆",
            "在理赔第三方资源采购、委托、遴选中操纵、串通、泄密",
            "插手、过问、干预理赔案件事项谋取不正当利益",
            "违规收受、索取利害关系人财物",
            "利用职务之便与第三方合作机构、人员发生财物往来或者兜售物品、商品",
            "接受有碍公正理赔的宴请或者其他服务",
            "本人及近亲属从事、参与与理赔有利益关联的经营活动",
            "处理本人及近亲属的赔案",
            "未经客户本人授权对外使用或泄露客户信息",
            "吸毒、酒驾、赌博",
            "理赔服务用车公车私用",
            "工作时间饮酒"
        ];
        
        let examQuestions = [];
        let currentUser = "";
        
        // 切换开始按钮状态
        function toggleStartBtn() {
            const name = document.getElementById("userName").value.trim();
            document.getElementById("startBtn").disabled = (name === "");
        }
        
        // 开始考试
        function startExam() {
            currentUser = document.getElementById("userName").value.trim();
            if (!currentUser) return;
            
            // 隐藏姓名页面，显示考试页面
            document.getElementById("nameSection").style.display = "none";
            document.getElementById("examSection").style.display = "block";
            document.getElementById("welcomeMsg").innerHTML = 
                "👤 考生：" + currentUser + "　|　📅 " + new Date().toLocaleDateString("zh-CN");
            
            // 随机打乱题目
            examQuestions = shuffleArray(articles.slice());
            
            // 生成题目
            generateQuestions();
        }
        
        // 随机打乱数组
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        // 生成题目HTML
        function generateQuestions() {
            const form = document.getElementById("quizForm");
            form.innerHTML = "";
            
            examQuestions.forEach((q, index) => {
                const num = index + 1;
                const div = document.createElement("div");
                div.className = "question";
                div.id = "q" + num;
                div.innerHTML = '<span class="question-num">第 ' + num + ' 题</span>' +
                    '<div><strong>严禁</strong>' +
                    '<input type="text" class="answer-input" id="a' + num + 
                    '" data-answer="' + q + '" placeholder="请填写..." oninput="checkAnswer(' + num + ')">' +
                    '</div>';
                form.appendChild(div);
            });
        }
        
        // 标准化字符串（去空格、转小写）
        function normalize(str) {
            return str.trim().replace(/\s+/g, "").toLowerCase();
        }
        
        // 实时检查答案
        function checkAnswer(num) {
            const input = document.getElementById("a" + num);
            const correctAnswer = input.getAttribute("data-answer");
            const userAnswer = input.value;
            
            if (userAnswer.trim() === "") {
                input.classList.remove("correct", "incorrect");
                updateProgress();
                return;
            }
            
            // 精确匹配
            if (normalize(userAnswer) === normalize(correctAnswer)) {
                input.classList.add("correct");
                input.classList.remove("incorrect");
            } else {
                input.classList.add("incorrect");
                input.classList.remove("correct");
            }
            
            updateProgress();
        }
        
        // 更新进度条
        function updateProgress() {
            const inputs = document.querySelectorAll(".answer-input");
            let filled = 0;
            inputs.forEach(input => {
                if (input.value.trim() !== "") filled++;
            });
            const pct = (filled / examQuestions.length * 100).toFixed(0);
            document.getElementById("progress").style.width = pct + "%";
        }
        
        // 提交考试
        function submitQuiz() {
            let score = 0;
            const wrongItems = [];
            
            examQuestions.forEach((question, index) => {
                const num = index + 1;
                const input = document.getElementById("a" + num);
                const userAnswer = input.value;
                const isCorrect = (normalize(userAnswer) === normalize(question));
                
                if (isCorrect) {
                    score++;
                } else {
                    wrongItems.push({
                        num: num,
                        correct: question,
                        user: userAnswer || "(未作答)"
                    });
                }
            });
            
            // 显示结果
            const pct = Math.round(score / examQuestions.length * 100);
            document.getElementById("score").textContent = pct + "分";
            document.getElementById("resultName").textContent = currentUser;
            
            let comment = "";
            if (pct >= 90) comment = "🎊 优秀！你对禁令非常熟悉！";
            else if (pct >= 60) comment = "👍 及格！还需要加强学习。";
            else comment = "💪 不及格，请认真学习禁令内容！";
            
            document.getElementById("resultText").innerHTML = 
                "答对 <strong>" + score + "</strong> 题，共 <strong>" + examQuestions.length + "</strong> 题<br>" + comment;
            
            // 显示错题
            const wrongDiv = document.getElementById("wrongList");
            if (wrongItems.length > 0) {
                let html = "<h3>❌ 错题详情：</h3>";
                wrongItems.forEach(item => {
                    html += '<div class="wrong-item">' +
                        "<h4>第 " + item.num + " 题</h4>" +
                        "<p><strong>正确答案：</strong>严禁" + item.correct + "</p>" +
                        "<p><strong>你的答案：</strong>" + item.user + "</p>" +
                        "</div>";
                });
                wrongDiv.innerHTML = html;
            } else {
                wrongDiv.innerHTML = "<h3>🎉 太棒了！全部答对！</h3>";
            }
            
            // 切换页面
            document.getElementById("examSection").style.display = "none";
            document.getElementById("result").classList.add("show");
        }
    </script>
</body>
</html>
